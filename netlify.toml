# Florence VIP — Netlify configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single Page App: serve index.html for all routes (direct URLs, refresh, PWA scope)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: hint for HTML (no long cache — Netlify hashes assets in /assets)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
